<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="title" content="Kailey Ventures | Institutional Strategic Holding">

    <meta name="keywords" content="Kailey Ventures, The Disposable Depot, Strategic Holding, Institutional Mandate, Market Authority, Business Strategy">
    <meta name="robots" content="index, follow">
    <meta name="language" content="English">
    <meta name="author" content="Kailey Ventures">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kaileyventures.github.io/">
    <meta property="og:title" content="Kailey Ventures | Institutional Strategic Holding">
    <meta property="og:description" content="Directing operational infrastructure for modern brands. The power behind The Disposable Depot.">
    <meta property="og:image" content="https://res.cloudinary.com/dxojtisjb/image/upload/v1772779794/Kailey-Ventures-logo-new_nhsgzl.png">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://kaileyventures.github.io/">
    <meta property="twitter:title" content="Kailey Ventures | Strategic Parent Organization">
    <meta property="twitter:description" content="The strategic force behind high-performing market leaders.">

    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dxojtisjb/image/upload/v1772779794/Kailey-Ventures-logo-new_nhsgzl.png">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Kailey Ventures",
      "alternateName": "KV Holding",
      "url": "https://kaileyventures.github.io/",
      "logo": "https://res.cloudinary.com/dxojtisjb/image/upload/v1772779794/Kailey-Ventures-logo-new_nhsgzl.png",
      "description": "Principal holding organization specializing in market strategy and infrastructure engineering.",
      "subOrganization": {
        "@type": "Organization",
        "name": "The Disposable Depot"
      }
    }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="grain-overlay" aria-hidden="true"></div>

    <div class="main-wrapper">
        <header class="header">
            <img src="https://res.cloudinary.com/dxojtisjb/image/upload/v1772779794/Kailey-Ventures-logo-new_nhsgzl.png" alt="Kailey Ventures Institutional Logo" class="logo">
            <div class="h-line" role="presentation"></div>
            <span class="mandate">Asset 001 - Holding Portfolio</span>
        </header>

        <main class="hero">
            <section class="hero-reveal">
                <p class="tagline">Principal Holding Organization</p>
                <h1>The strategic force <br> behind <span class="depot-signature">The Disposable Depot.</span></h1>
                
                <nav class="cta-container">
                    <a href="https://kaileyventures.vercel.app" class="elite-button" aria-label="Visit the main site of Kailey Ventures">
                        <span class="btn-text">Go to Main Site</span>
                        <span class="btn-arrow">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </span>
                    </a>
                </nav>
            </section>
        </main>

        <footer class="bottom-bar">
            <div class="redirect-info">
                <div class="timer-circle" aria-live="polite">
                    <svg viewBox="0 0 36 36" class="circular-chart" aria-hidden="true">
                        <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path id="progress-circle" class="circle" stroke-dasharray="100, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    </svg>
                    <span id="timer">10</span>
                </div>
                <p>Auto-Redirecting to Ecosystem</p>
            </div>
            <div class="stats">
                <span>400+ Active Clients</span>
                <span class="dot" role="separator"></span>
                <span>Market Authority</span>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
